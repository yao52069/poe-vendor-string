name: 🔄 同步上游更新

on:
  schedule:
    - cron: '0 2 * * *'   # 每天北京时间上午 10:00 自动检测
  workflow_dispatch:        # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    name: 同步 veiset/poe-vendor-string

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/veiset/poe-vendor-string.git

      - name: 获取上游最新代码
        run: git fetch upstream master

      - name: 检查是否有新更新
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          echo "local=$LOCAL"
          echo "upstream=$UPSTREAM"
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "status=up_to_date" >> $GITHUB_OUTPUT
            echo "✅ 已是最新，无需同步"
          else
            echo "status=needs_sync" >> $GITHUB_OUTPUT
            echo "🔄 检测到上游有新更新，开始合并..."
          fi

      - name: 合并上游更新（优先保留汉化文件）
        if: steps.check.outputs.status == 'needs_sync'
        id: merge
        run: |
          git merge upstream/master --no-edit \
            -m "chore: 自动同步上游 veiset/poe-vendor-string" && \
          echo "result=success" >> $GITHUB_OUTPUT || \
          (git merge --abort && echo "result=conflict" >> $GITHUB_OUTPUT)

      - name: 推送合并结果
        if: steps.merge.outputs.result == 'success'
        run: |
          git push origin master
          echo "✅ 同步成功，Vercel 将自动重新部署"

      - name: 创建冲突提醒 Issue
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ 上游更新存在冲突，需要手动合并',
                labels: ['sync-conflict'],
                body: [
                  '## 自动同步失败',
                  '',
                  '上游仓库 [`veiset/poe-vendor-string`](https://github.com/veiset/poe-vendor-string) 有新更新，',
                  '但与汉化修改存在冲突，需要手动解决。',
                  '',
                  '### 解决步骤',
                  '```bash',
                  'git fetch upstream',
                  'git merge upstream/master',
                  '# 编辑冲突文件，保留汉化内容',
                  'git add .',
                  'git commit -m "fix: 手动解决上游合并冲突"',
                  'git push',
                  '```',
                  '',
                  '解决后请关闭此 Issue。'
                ].join('\n')
              });
            }
